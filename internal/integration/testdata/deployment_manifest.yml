apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: test-lab
spec:
  replicas: 1
  minReadySeconds: 25
  selector:
    matchLabels:
      app: app-deployment
  template:
    metadata:
      labels:
        app: app-deployment
    spec:
      containers:
      - name: app
        image: busybox:1.36.0
        command: ["sh", "-c", "sleep 3600"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
